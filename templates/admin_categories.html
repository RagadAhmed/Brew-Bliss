{% extends "base.html" %}
{% block title %}Manage Categories | Brew Bliss{% endblock %}
{% block content %}
<section class="admin-shell">
    <div class="admin-heading">
        <div>
            <p class="eyebrow">Admin</p>
            <h1>Manage Categories</h1>
        </div>
        <a class="btn light" href="{{ url_for('admin_dashboard') }}">Back to Dashboard</a>
    </div>
    <form class="form-panel category-form" method="post">
        <label>Category name<input name="name" required placeholder="Seasonal Drinks"></label>
        <label>Description<input name="description" placeholder="Limited coffee and pastry releases"></label>
        <button class="btn primary" type="submit">Add Category</button>
    </form>
    <div class="table-wrap">
        <table>
            <thead>
                <tr><th>Name</th><th>Description</th><th>Action</th></tr>
            </thead>
            <tbody>
                {% for category in categories %}
                    <tr>
                        <td>{{ category["name"] }}</td>
                        <td>{{ category["description"] }}</td>
                        <td>
                            <form method="post" action="{{ url_for('admin_delete_category', category_id=category['id']) }}" data-confirm="Delete this category?">
                                <button class="text-danger" type="submit">Delete</button>
                            </form>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</section>
{% endblock %}
