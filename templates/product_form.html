{% extends "base.html" %}
{% block title %}{{ 'Edit' if product else 'Add' }} Product | Brew Bliss{% endblock %}
{% block content %}
<section class="admin-shell narrow">
    <p class="eyebrow">Catalog</p>
    <h1>{{ "Edit" if product else "Add" }} Product</h1>
    <form class="form-panel" method="post">
        <label>Name<input name="name" required value="{{ product['name'] if product else '' }}"></label>
        <label>Category
            <input list="category-list" name="category" required value="{{ product['category'] if product else '' }}">
            <datalist id="category-list">
                {% for category in categories %}
                    <option value="{{ category['name'] }}"></option>
                {% endfor %}
            </datalist>
        </label>
        <label>Price<input type="number" step="0.01" min="0" name="price" required value="{{ product['price'] if product else '' }}"></label>
        <label>Image path<input name="image" required value="{{ product['image'] if product else 'images/latte.svg' }}"></label>
        <label>Rating<input type="number" step="0.1" min="1" max="5" name="rating" required value="{{ product['rating'] if product else 4.8 }}"></label>
        <label>Promo Tag<input name="promo_tag" value="{{ product['promo_tag'] if product else '' }}"></label>
        <label>Stock<input type="number" min="0" name="stock" required value="{{ product['stock'] if product else 20 }}"></label>
        <label>Description<textarea name="description" rows="5" required>{{ product['description'] if product else '' }}</textarea></label>
        <label>Ingredients<textarea name="ingredients" rows="3">{{ product['ingredients'] if product else '' }}</textarea></label>
        <label class="checkbox"><input type="checkbox" name="featured" {% if product and product['featured'] %}checked{% endif %}> Featured product</label>
        <button class="btn primary" type="submit">Save Product</button>
    </form>
</section>
{% endblock %}
